version: '3.8'

services:
  # ─── Base de données MongoDB ───
  mongo:
    image: mongo:7
    container_name: pokemon-mongo
    restart: always
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - pokemon-net
    # Pas de port exposé : seul le backend y accède

  # ─── Backend FastAPI ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pokemon-backend
    restart: always
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=pokemon_classeur
      - JWT_SECRET=${JWT_SECRET:-changez-moi-avec-openssl-rand-hex-32}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@pokemon.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      - CHILD_EMAIL=${CHILD_EMAIL:-maurat.leo@gmail.com}
      - CHILD_PASSWORD=${CHILD_PASSWORD:-Facile33}
      - CHILD_NAME=${CHILD_NAME:-Léo}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - FRONTEND_URL=https://${DOMAIN:-pokemon.equiptoi.fr}
    networks:
      - pokemon-net

  # ─── Frontend React (Nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://${DOMAIN:-pokemon.equiptoi.fr}
    container_name: pokemon-frontend
    restart: always
    ports:
      - "${HTTP_PORT:-8880}:80"
    depends_on:
      - backend
    networks:
      - pokemon-net

networks:
  pokemon-net:
    driver: bridge
